schema: spec-driven

context: |
  This repo is a collection of agent skills (skills/<name>/SKILL.md layout)
  distributed via the Vercel skills CLI (`npx skills add <owner>/<repo>`).
  Deliverables are markdown skill instructions, not application code.

  North star lens: unclear conventions burn every newcomer; the AI agent
  is only the most demanding one (it re-onboards every session). Prefer
  artifacts humans and agents share (docs, configs) over agent-only
  surfaces (rules) — the doc-first routing rule exists for this reason.

  Conventions (decided, non-negotiable):
  - All skill bodies and frontmatter are written in English.
  - Cross-platform first: skills must work on any agent that supports the
    Agent Skills spec; platform-specific behavior (Claude Code, Cursor) is
    isolated in clearly-marked sections. Phase 1 agent matrix: Claude Code
    (.claude/rules/*.md), Cursor (.cursor/rules/*.mdc), AGENTS.md fallback.
  - Frontmatter name must equal the skill directory name.
  - Description format: first sentence = capability, second = "Use when ..."
    triggers, max 1024 chars.
  - SKILL.md bodies stay under ~100 lines; split details into references/.

rules:
  proposal:
    - Always include a "Non-goals" section
  design:
    - Cite research evidence (papers, competitor repos) where a decision
      rests on it
